<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard · Consumption Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script>
      tailwind.config = { darkMode: "class" };
      (function () {
        try {
          const t = localStorage.getItem("theme");
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch {}
      })();
    </script>
  </head>
  <body class="min-h-screen bg-white text-zinc-950 dark:bg-zinc-950 dark:text-zinc-50">
    <div class="border-b border-zinc-200 bg-white dark:border-zinc-800 dark:bg-zinc-950">
      <div class="container mx-auto flex h-14 max-w-6xl items-center justify-between px-4">
        <a class="flex items-center gap-2" href="/">
          <div class="h-8 w-8 rounded-lg bg-zinc-950 dark:bg-zinc-50"></div>
          <div class="text-sm font-semibold">Dashboard</div>
        </a>
        <div class="flex items-center gap-3">
          <div class="text-xs text-zinc-600 dark:text-zinc-300">{{ user.email }}</div>
          <button
            id="btn-logout"
            class="rounded-full border border-zinc-200 bg-white px-3 py-1 text-xs font-medium text-zinc-700 hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-950 dark:text-zinc-200 dark:hover:bg-zinc-900"
            type="button"
          >
            Logout
          </button>
        </div>
      </div>
    </div>

    <main class="container mx-auto max-w-6xl px-4 py-10">
      <div class="grid grid-cols-1 gap-4 lg:grid-cols-3">
        <div class="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm dark:border-zinc-800 dark:bg-zinc-950">
          <div class="text-xs font-medium text-zinc-500 dark:text-zinc-400">Electricity (EUR)</div>
          <div id="tot-elec" class="mt-1 text-3xl font-semibold tracking-tight">—</div>
        </div>
        <div class="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm dark:border-zinc-800 dark:bg-zinc-950">
          <div class="text-xs font-medium text-zinc-500 dark:text-zinc-400">Gas (EUR)</div>
          <div id="tot-gas" class="mt-1 text-3xl font-semibold tracking-tight">—</div>
        </div>
        <div class="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm dark:border-zinc-800 dark:bg-zinc-950">
          <div class="text-xs font-medium text-zinc-500 dark:text-zinc-400">Water (EUR)</div>
          <div id="tot-water" class="mt-1 text-3xl font-semibold tracking-tight">—</div>
          <div class="mt-1 text-xs text-zinc-500 dark:text-zinc-400">Hot + Cold</div>
        </div>
      </div>

      <div class="mt-8 grid grid-cols-1 gap-4 lg:grid-cols-3">
        <div class="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm dark:border-zinc-800 dark:bg-zinc-950 lg:col-span-2">
          <div class="flex items-center justify-between">
            <div class="text-sm font-semibold">Price variation (tariff history)</div>
            <select
              id="rt"
              class="rounded-xl border border-zinc-200 bg-white px-3 py-2 text-sm dark:border-zinc-800 dark:bg-zinc-950"
            >
              <option value="electricity">Electricity</option>
              <option value="gas">Gas</option>
              <option value="hot_water">Hot water</option>
              <option value="cold_water">Cold water</option>
            </select>
          </div>
          <div class="mt-4">
            <canvas id="chart" height="110"></canvas>
          </div>
        </div>

        <div class="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm dark:border-zinc-800 dark:bg-zinc-950">
          <div class="text-sm font-semibold">Recent settlements</div>
          <div id="pays" class="mt-3 flex flex-col gap-3"></div>
        </div>
      </div>
    </main>

    <script>
      async function api(path) {
        const res = await fetch(path, { cache: "no-store", credentials: "include" });
        if (res.status === 401) location.href = "/login";
        if (!res.ok) throw new Error("api failed");
        return await res.json();
      }

      async function post(path) {
        const res = await fetch(path, { method: "POST", credentials: "include" });
        return await res.json().catch(() => ({}));
      }

      document.getElementById("btn-logout").addEventListener("click", async () => {
        await post("/auth/logout");
        location.href = "/";
      });

      const elElec = document.getElementById("tot-elec");
      const elGas = document.getElementById("tot-gas");
      const elWater = document.getElementById("tot-water");
      const pays = document.getElementById("pays");
      const rt = document.getElementById("rt");

      const ctx = document.getElementById("chart").getContext("2d");
      const chart = new Chart(ctx, {
        type: "line",
        data: { labels: [], datasets: [{ label: "EUR per unit", data: [], borderWidth: 2, pointRadius: 0 }] },
        options: {
          responsive: true,
          scales: { x: { display: false } },
          plugins: { legend: { display: false } }
        }
      });

      function clear(el) {
        while (el.firstChild) el.removeChild(el.firstChild);
      }

      async function refreshSummary() {
        const s = await api("/v1/me/summary");
        const t = s.totalsEurByResource || {};
        const elec = Number(t.electricity || 0);
        const gas = Number(t.gas || 0);
        const hw = Number(t.hot_water || 0);
        const cw = Number(t.cold_water || 0);
        elElec.textContent = "€" + elec.toFixed(2);
        elGas.textContent = "€" + gas.toFixed(2);
        elWater.textContent = "€" + (hw + cw).toFixed(2);

        clear(pays);
        const last = (s.recentPayments || []).slice(-8).reverse();
        if (last.length === 0) {
          const d = document.createElement("div");
          d.className = "text-xs text-zinc-500 dark:text-zinc-400";
          d.textContent = "No payments yet.";
          pays.appendChild(d);
        } else {
          for (const p of last) {
            const row = document.createElement("div");
            row.className = "flex items-center justify-between gap-3 rounded-xl border border-zinc-200 p-3 dark:border-zinc-800";
            const left = document.createElement("div");
            left.className = "min-w-0";
            const h = document.createElement("div");
            h.className = "truncate text-xs font-medium text-zinc-900 dark:text-zinc-50";
            h.textContent = p.paymentHash;
            const ts = document.createElement("div");
            ts.className = "text-xs text-zinc-500 dark:text-zinc-400";
            ts.textContent = new Date(p.ts).toLocaleTimeString();
            left.append(h, ts);
            const right = document.createElement("div");
            right.className = "text-right";
            right.innerHTML =
              '<div class="text-xs font-semibold">' +
              p.amountSats +
              " sats</div><div class='text-xs text-zinc-500 dark:text-zinc-400'>fee " +
              p.feeSats +
              "</div>";
            row.append(left, right);
            pays.appendChild(row);
          }
        }
      }

      async function refreshChart() {
        const rtv = rt.value;
        const data = await api("/v1/me/tariffs/history?resourceType=" + encodeURIComponent(rtv));
        const pts = data.points || [];
        chart.data.labels = pts.map((p) => p.ts);
        chart.data.datasets[0].data = pts.map((p) => p.pricePerUnit);
        chart.update();
      }

      rt.addEventListener("change", refreshChart);
      refreshSummary().catch(() => {});
      refreshChart().catch(() => {});
      setInterval(() => refreshSummary().catch(() => {}), 1500);
      setInterval(() => refreshChart().catch(() => {}), 4000);
    </script>
  </body>
</html>
